name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter-ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Flutter via FVM
      - name: Set up FVM
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Create dummy .env for build (real credentials in secrets)
      - name: Create .env for build
        run: |
          echo "SUPABASE_URL=https://dummy.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=dummy_key" >> .env

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Check code formatting
      - name: Check formatting
        run: dart format --set-exit-if-changed .

      # 5. Run analyzer (lints + compile-time errors)
      - name: Run analyzer
        run: flutter analyze

      # 6. Run tests
      - name: Run tests
        run: flutter test

      # 7. Build APK (debug) to verify compilation
      - name: Build APK (debug)
        run: flutter build apk --debug
